workflows:
  android-debug-build:
    name: Android Debug Build
    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - name: Make gradlew executable
        script: chmod +x ./gradlew

      - name: Build APK
        script: ./gradlew clean :app:assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk
