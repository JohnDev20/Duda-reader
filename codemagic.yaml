workflows:
  android-debug-build:
    name: Android Debug Build
    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - name: Make gradlew executable
        script: |
          chmod +x ./gradlew
          ls -la ./gradlew
          ./gradlew --version

      - name: Build APK
        script: |
          set -e
          ./gradlew clean :app:assembleDebug --stacktrace --info
          find . -type f -name "*.apk" -maxdepth 6 || true
          ls -R app/build/outputs || true

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/outputs/**/*.apk
