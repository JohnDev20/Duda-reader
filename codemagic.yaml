workflows:
  android-debug-build:
    name: Duda Reader Debug Build
    max_build_duration: 30
    instance_type: linux_m2
    environment:
      android_sdk: 34
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set execute permission for gradlew
        script: chmod +x gradlew
      - name: Build Android Debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
